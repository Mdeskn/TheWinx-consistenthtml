<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Detail – Instant Mobility</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<div class="container">

    <div class="panel hero">
        <div>
            <p class="eyebrow">BC-05 Rating</p>
            <h1>Rating #<span th:text="${rating.ratingId}"></span></h1>
            <p class="subtitle">
                Submitted for Booking #<span th:text="${rating.bookingId}"></span>
                by User #<span th:text="${rating.userId}"></span>
                on <span th:text="${#temporals.format(rating.createdAt, 'dd MMM yyyy, HH:mm')}"></span>.
            </p>
        </div>
        <div class="link-group">
            <a class="link-button secondary-button" th:href="@{/ratings}">← All Ratings</a>
            <a class="link-button secondary-button"
               th:href="@{/ratings/vehicle/{id}(id=${rating.vehicleId})}">Vehicle Ratings</a>
            <a class="link-button secondary-button"
               th:href="@{/ratings/provider/{id}(id=${rating.providerId})}">Provider Ratings</a>
        </div>
    </div>

    <div class="panel">
        <h2>Scores</h2>
        <div class="detail-grid">
            <span class="detail-label">Vehicle</span>
            <span class="detail-value">
                #<a th:href="@{/ratings/vehicle/{id}(id=${rating.vehicleId})}"
                    th:text="${rating.vehicleId}"></a>
                &nbsp;
                <span class="status"
                      th:classappend="${rating.vehicleScore >= 4} ? 'score-high' : (${rating.vehicleScore == 3} ? 'score-mid' : 'score-low')"
                      th:text="${rating.vehicleScore} + ' / 5'"></span>
            </span>

            <hr class="detail-divider">

            <span class="detail-label">Provider</span>
            <span class="detail-value">
                #<a th:href="@{/ratings/provider/{id}(id=${rating.providerId})}"
                    th:text="${rating.providerId}"></a>
                &nbsp;
                <span class="status"
                      th:classappend="${rating.providerScore >= 4} ? 'score-high' : (${rating.providerScore == 3} ? 'score-mid' : 'score-low')"
                      th:text="${rating.providerScore} + ' / 5'"></span>
            </span>

            <hr class="detail-divider">

            <span class="detail-label">Comment</span>
            <span class="detail-value italic"
                  th:if="${rating.comment != null and !rating.comment.isEmpty()}"
                  th:text="${rating.comment}"></span>
            <span class="detail-value text-muted"
                  th:if="${rating.comment == null or rating.comment.isEmpty()}">No comment left.</span>
        </div>
    </div>

    <div class="panel">
        <h2>Reference IDs</h2>
        <div class="detail-grid">
            <span class="detail-label">Rating ID</span>
            <span class="detail-value" th:text="${rating.ratingId}"></span>

            <hr class="detail-divider">

            <span class="detail-label">Booking ID</span>
            <span class="detail-value" th:text="${rating.bookingId}"></span>

            <hr class="detail-divider">

            <span class="detail-label">User ID</span>
            <span class="detail-value" th:text="${rating.userId}"></span>

            <hr class="detail-divider">

            <span class="detail-label">Submitted at</span>
            <span class="detail-value"
                  th:text="${#temporals.format(rating.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
        </div>
    </div>

</div>
</body>
</html>
