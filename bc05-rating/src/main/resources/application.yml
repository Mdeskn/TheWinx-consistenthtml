server:
  port: 8085

spring:
  application:
    name: bc05-rating
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  datasource:
    url: jdbc:h2:mem:rating;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

# Local copy for Task 1 (standalone). In Task 2 this is served by the Config Server.
resilience4j:
  circuitbreaker:
    instances:
      booking:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      fleet:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

# Direct URLs for downstream services (standalone mode, without Eureka)
fleet:
  service:
    url: http://localhost:8082

booking:
  service:
    url: http://localhost:8083
