# Shared defaults served by infra-config-server to every microservice.
# Applied on top of each service's local application.yml in Task 2.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
