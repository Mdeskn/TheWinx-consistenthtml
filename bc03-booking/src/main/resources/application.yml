server:
  port: 8083

spring:
  application:
    name: bc03-booking
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true        # enable Apache HC5 client (supports PATCH)
  datasource:
    url: jdbc:h2:mem:booking;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

# Local copy for Task 1 (standalone). In Task 2 this is served by the Config Server.
resilience4j:
  circuitbreaker:
    instances:
      identity:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      fleet:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      payment:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s

# Direct URLs for downstream services (standalone mode, without Eureka)
fleet:
  service:
    url: http://localhost:8082

payment:
  service:
    url: http://localhost:8084

identity:
  service:
    url: http://localhost:8081
