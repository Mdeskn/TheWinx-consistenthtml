<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Booking · Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="http://localhost:8080/styles.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Instant Mobility · Booking (BC-03)</span>
        <div>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/search}">Search</a>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/bookings}">My bookings</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <h3>Booking <span th:text="${booking.bookingId()}">1</span></h3>

    <table class="table bg-white w-auto">
        <tr><th class="pe-4">Status</th>
            <td><span class="badge"
                      th:classappend="${booking.status() == 'ACTIVE'} ? 'bg-success' : (${booking.status() == 'CANCELLED'} ? 'bg-secondary' : 'bg-info')"
                      th:text="${booking.status()}">ACTIVE</span></td></tr>
        <tr><th>User</th><td th:text="${booking.userId()}">1</td></tr>
        <tr><th>Vehicle</th><td th:text="${booking.vehicleId()} + ' (' + ${booking.vehicleType()} + ')'">1</td></tr>
        <tr><th>Price</th><td th:text="${booking.pricePerUnit()} + ' / ' + ${booking.billingModel()}">0.20</td></tr>
        <tr><th>Start time</th><td th:text="${booking.startTime()}">—</td></tr>
        <tr><th>End time</th><td th:text="${booking.endTime()} ?: '—'">—</td></tr>
        <tr><th>Start location</th><td th:text="${booking.startLatitude()} + ', ' + ${booking.startLongitude()}">—</td></tr>
        <tr><th>Total cost</th><td th:text="${booking.totalCost()} ?: '—'">—</td></tr>
    </table>

    <form method="post" th:action="@{/ui/bookings/{id}/end(id=${booking.bookingId()})}"
          th:if="${booking.status() == 'ACTIVE'}" class="mb-2">
        <button class="btn btn-success" type="submit">End ride</button>
        <span class="text-muted ms-2 small">End location &amp; distance are captured automatically (simulated device telemetry).</span>
    </form>

    <form method="post" th:action="@{/ui/bookings/{id}/cancel(id=${booking.bookingId()})}"
          th:if="${booking.status() == 'ACTIVE'}" class="mb-2">
        <button class="btn btn-danger" type="submit">Cancel booking</button>
    </form>
    <a class="btn btn-link" th:href="@{/ui/bookings(userId=${booking.userId()})}">← Back to my bookings</a>
</div>
</body>
</html>
