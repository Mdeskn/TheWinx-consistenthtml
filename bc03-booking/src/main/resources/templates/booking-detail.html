<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking · Detail</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<main class="container">

    <header class="topbar">
        <div class="topbar-brand">
            <span class="badge-bc">BC-03</span>
            <h1>Instant Mobility · Booking</h1>
        </div>
        <nav class="nav-links">
            <a th:href="@{/ui/search}">Search</a>
            <a th:href="@{/ui/bookings}">My Bookings</a>
        </nav>
    </header>

    <section class="panel hero">
        <div>
            <p class="eyebrow">Booking Detail</p>
            <h1>Booking #<span th:text="${booking.bookingId()}">1</span></h1>
        </div>
        <nav class="link-group">
            <a class="link-button secondary-button"
               th:href="@{/ui/bookings(userId=${booking.userId()})}">← My Bookings</a>
        </nav>
    </section>

    <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>

    <section class="panel">
        <h2>Trip Info</h2>
        <div class="detail-grid">
            <span class="detail-label">Status</span>
            <span class="detail-value">
                <span class="status"
                      th:classappend="${booking.status() == 'ACTIVE'} ? 'status-active' : (${booking.status() == 'CANCELLED'} ? 'status-inactive' : 'status-info')"
                      th:text="${booking.status()}">ACTIVE</span>
            </span>

            <hr class="detail-divider">

            <span class="detail-label">User</span>
            <span class="detail-value" th:text="${booking.userId()}">1</span>

            <hr class="detail-divider">

            <span class="detail-label">Vehicle</span>
            <span class="detail-value"
                  th:text="${booking.vehicleId()} + ' (' + ${booking.vehicleType()} + ')'">1</span>

            <hr class="detail-divider">

            <span class="detail-label">Price</span>
            <span class="detail-value"
                  th:text="${booking.pricePerUnit()} + ' / ' + ${booking.billingModel()}">0.20</span>

            <hr class="detail-divider">

            <span class="detail-label">Start Time</span>
            <span class="detail-value" th:text="${booking.startTime()}">—</span>

            <hr class="detail-divider">

            <span class="detail-label">End Time</span>
            <span class="detail-value" th:text="${booking.endTime()} ?: '—'">—</span>

            <hr class="detail-divider">

            <span class="detail-label">Start Location</span>
            <span class="detail-value"
                  th:text="${booking.startLatitude()} + ', ' + ${booking.startLongitude()}">—</span>

            <hr class="detail-divider">

            <span class="detail-label">Total Cost</span>
            <span class="detail-value" th:text="${booking.totalCost()} ?: '—'">—</span>
        </div>
    </section>

    <section class="panel" th:if="${booking.status() == 'ACTIVE'}">
        <h2>Actions</h2>
        <div class="btn-row">
            <form method="post" th:action="@{/ui/bookings/{id}/end(id=${booking.bookingId()})}">
                <button type="submit">End Ride</button>
            </form>
            <form method="post" th:action="@{/ui/bookings/{id}/cancel(id=${booking.bookingId()})}">
                <button class="danger-button" type="submit">Cancel Booking</button>
            </form>
        </div>
        <p class="text-muted" style="margin-top:.5rem;">End location &amp; distance are captured automatically (simulated device telemetry).</p>
    </section>

</main>
</body>
</html>
