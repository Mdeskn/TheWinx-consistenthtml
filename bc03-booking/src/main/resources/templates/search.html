<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Booking · Search vehicles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="http://localhost:8080/styles.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Instant Mobility · Booking (BC-03)</span>
        <div>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/search}">Search</a>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/bookings}">My bookings</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3>Search available vehicles</h3>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="get" th:action="@{/ui/search}" class="row g-3 align-items-end mb-4">
        <div class="col-md-3">
            <label class="form-label" for="location">Location</label>
            <select class="form-select" id="location" name="location">
                <option value="">— choose a location —</option>
                <option th:each="loc : ${locations}" th:value="${loc.key()}"
                        th:text="${loc.displayName()}"
                        th:selected="${loc.key() == selectedLocation}">Place</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="radiusKm">Radius (km)</label>
            <input class="form-control" id="radiusKm" name="radiusKm" type="number" step="any" th:value="${radiusKm}"/>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="type">Type</label>
            <input class="form-control" id="type" name="type" type="text" th:value="${type}" placeholder="E_SCOOTER"/>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="token">Auth token</label>
            <input class="form-control" id="token" name="token" type="text" th:value="${token}" placeholder="X-Auth-Token"/>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" type="submit">Search</button>
        </div>
    </form>

    <div th:if="${results != null}">
        <h5 th:text="'Results (' + ${#lists.size(results)} + ')'">Results</h5>
        <table class="table table-striped bg-white">
            <thead>
            <tr><th>ID</th><th>Type</th><th>Description</th><th>Status</th><th>Price</th><th>Billing</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="v : ${results}">
                <td th:text="${v.vehicleId()}">1</td>
                <td th:text="${v.type()}">E_SCOOTER</td>
                <td th:text="${v.description()}">desc</td>
                <td th:text="${v.status()}">AVAILABLE</td>
                <td th:text="${v.pricePerUnit()}">0.20</td>
                <td th:text="${v.billingModel()}">PER_HOUR</td>
                <td>
                    <form method="post" th:action="@{/ui/bookings/create}">
                        <input type="hidden" name="vehicleId" th:value="${v.vehicleId()}"/>
                        <input type="hidden" name="startLatitude" th:value="${lat}"/>
                        <input type="hidden" name="startLongitude" th:value="${lon}"/>
                        <input type="hidden" name="token" th:value="${token}"/>
                        <button class="btn btn-sm btn-success" type="submit"
                                th:disabled="${v.status() != 'AVAILABLE'}">Book</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(results)}">
                <td colspan="7" class="text-muted">No available vehicles (or Fleet Management is unavailable).</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
