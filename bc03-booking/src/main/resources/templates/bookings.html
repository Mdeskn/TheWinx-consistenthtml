<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Booking · My bookings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="http://localhost:8080/styles.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Instant Mobility · Booking (BC-03)</span>
        <div>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/search}">Search</a>
            <a class="btn btn-sm btn-outline-light" th:href="@{/ui/bookings}">My bookings</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3>My bookings</h3>

    <form method="get" th:action="@{/ui/bookings}" class="row g-3 align-items-end mb-4">
        <div class="col-md-3">
            <label class="form-label" for="userId">User ID</label>
            <input class="form-control" id="userId" name="userId" type="number" th:value="${userId}" placeholder="1"/>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" type="submit">Show</button>
        </div>
    </form>

    <table class="table table-striped bg-white" th:if="${bookings != null}">
        <thead>
        <tr><th>ID</th><th>Vehicle</th><th>Type</th><th>Start</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="b : ${bookings}">
            <td th:text="${b.bookingId()}">1</td>
            <td th:text="${b.vehicleId()}">1</td>
            <td th:text="${b.vehicleType()}">E_SCOOTER</td>
            <td th:text="${b.startTime()}">2026-06-09T10:00</td>
            <td>
                <span class="badge"
                      th:classappend="${b.status() == 'ACTIVE'} ? 'bg-success' : (${b.status() == 'CANCELLED'} ? 'bg-secondary' : 'bg-info')"
                      th:text="${b.status()}">ACTIVE</span>
            </td>
            <td><a class="btn btn-sm btn-outline-primary" th:href="@{/ui/bookings/{id}(id=${b.bookingId()})}">Open</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookings)}">
            <td colspan="6" class="text-muted">No bookings for this user.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
