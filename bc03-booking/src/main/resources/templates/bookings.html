<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking · My Bookings</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<main class="container">

    <nav class="site-nav">
        <a class="site-nav-brand" href="http://localhost:8081/">TheWinx</a>
        <a href="http://localhost:8081/">Identity</a>
        <a href="http://localhost:8082/list.html">Fleet</a>
        <a class="current" href="http://localhost:8083/ui/search">Booking</a>
        <a href="http://localhost:8084/payments">Payments</a>
        <a href="http://localhost:8085/ratings">Ratings</a>
    </nav>

    <header class="panel hero">
        <hgroup>
            <p class="eyebrow">BC-03 · Booking</p>
            <h1>My Bookings</h1>
            <p class="subtitle">View and manage your active and past ride bookings.</p>
        </hgroup>
        <nav class="link-group">
            <a class="link-button secondary-button" th:href="@{/ui/search}">← Search Vehicles</a>
        </nav>
    </header>

    <section class="panel">
        <h2>Filter by User</h2>
        <form method="get" th:action="@{/ui/bookings}" class="form-grid">
            <label>User ID (leave empty for all)
                <input type="number" id="userId" name="userId" th:value="${userId}" placeholder="e.g. 1">
            </label>
            <label>&nbsp;
                <button type="submit">Show</button>
            </label>
        </form>
    </section>

    <section class="panel">
        <h2>Bookings</h2>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th><th>User</th><th>Vehicle</th><th>Type</th><th>Start Time</th><th>Status</th><th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="${b.bookingId()}">1</td>
                    <td th:text="${b.userId()}">1</td>
                    <td th:text="${b.vehicleId()}">1</td>
                    <td th:text="${b.vehicleType()}">E_SCOOTER</td>
                    <td th:text="${b.startTime()}">2026-06-09T10:00</td>
                    <td>
                        <span class="status"
                              th:classappend="${b.status() == 'ACTIVE'} ? 'status-active' : (${b.status() == 'CANCELLED'} ? 'status-inactive' : 'status-info')"
                              th:text="${b.status()}">ACTIVE</span>
                    </td>
                    <td>
                        <a class="link-button secondary-button"
                           th:href="@{/ui/bookings/{id}(id=${b.bookingId()})}">Open</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="7" class="text-muted">No bookings found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>
</body>
</html>
