<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body class="auth-theme auth-register">
<main class="container-fluid px-0 auth-shell">
    <section class="row g-0 auth-card">
        <div class="col-lg-6 d-none d-lg-flex auth-art align-items-center justify-content-center">
            <a class="brand" href="/">iofrm</a>
        </div>

        <div class="col-12 col-lg-6 auth-form-wrap d-flex align-items-center">
            <div class="auth-form-inner w-100 mx-auto">
                <h1>Get more things done with Loggin platform.</h1>
                <p class="auth-sub">Access to the most powerfull tool in the entire design and web industry.</p>

                <div class="alert alert-danger py-2 px-3 mb-3" th:if="${error != null}" th:text="${error}"></div>

                <nav class="auth-switch d-flex" aria-label="Authentication mode">
                    <a href="/ui/login">Login</a>
                    <a class="active" href="/ui/register">Register</a>
                </nav>

                <form id="registerForm" class="auth-form" action="/ui/users" method="post" novalidate>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="mb-3">
                                <input id="firstName" class="form-control" type="text" name="firstName" placeholder="First name" required>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="mb-3">
                                <input id="lastName" class="form-control" type="text" name="lastName" placeholder="Last name" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <input id="email" class="form-control" type="email" name="email" placeholder="E-mail Address" required>
                    </div>

                    <div class="mb-3">
                        <input id="username" class="form-control" type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="mb-3">
                        <input id="phoneNumber" class="form-control" type="text" name="phoneNumber" placeholder="Phone number" inputmode="numeric" maxlength="20" pattern="[0-9]{1,20}" required>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input id="password" class="form-control" type="password" name="password" placeholder="Password" minlength="6" required>
                            <button class="btn btn-outline-secondary password-toggle" type="button" data-password-toggle aria-label="Show passwords" aria-pressed="false">
                                <span class="password-toggle-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input id="confirmPassword" class="form-control" type="password" name="confirmPassword" placeholder="Confirm password" minlength="6" required>
                            <button class="btn btn-outline-secondary password-toggle" type="button" data-password-toggle aria-label="Show passwords" aria-pressed="false">
                                <span class="password-toggle-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <input type="hidden" name="redirectTo" value="/ui/login">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <button type="submit" class="btn auth-btn">Register</button>
                    </div>
                </form>

            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const registerForm = document.getElementById("registerForm");
    const emailInput = document.getElementById("email");
    const phoneInput = document.getElementById("phoneNumber");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const passwordToggleButtons = document.querySelectorAll("[data-password-toggle]");
    const eyeIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>';
    const eyeSlashIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238 15 12.879l-.707.707-2.018-2.018A8.7 8.7 0 0 1 8 13.5C3 13.5 0 8 0 8a15 15 0 0 1 3.293-3.85L1 1.854 1.707 1.146l12 12-.348.092zM11.297 9.176l-1.442-1.442a2 2 0 0 1-2.113-2.113L6.298 4.176A3 3 0 0 0 11.297 9.176M5.833 3.711l1.531 1.531A2 2 0 0 1 9.758 7.636l1.531 1.531A3.998 3.998 0 0 0 12 8c0-.335-.042-.66-.121-.97A13 13 0 0 0 14.828 8c-.058.087-.122.178-.195.288a13 13 0 0 1-1.465 1.755q-.12.12-.246.238l-.735-.735A3 3 0 0 1 8 11a3 3 0 0 1-3-3 3 3 0 0 1 .833-2.089"/><path d="M8 3.5c2.12 0 3.879 1.168 5.168 2.457q.175.175.34.355A13 13 0 0 0 14.828 8c-.086.13-.195.288-.195.288l.707.707S16 8 16 8s-3-5.5-8-5.5a7.8 7.8 0 0 0-2.207.319l.84.84A6.8 6.8 0 0 1 8 3.5"/></svg>';
    let passwordsVisible = false;

    phoneInput.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "").slice(0, 20);
    });

    function setPasswordVisibility(visible) {
        passwordsVisible = visible;
        const newType = visible ? "text" : "password";
        passwordInput.type = newType;
        confirmPasswordInput.type = newType;

        passwordToggleButtons.forEach(function (button) {
            const icon = button.querySelector(".password-toggle-icon");
            button.setAttribute("aria-pressed", String(visible));
            button.setAttribute("aria-label", visible ? "Hide passwords" : "Show passwords");
            if (icon) {
                icon.innerHTML = visible ? eyeSlashIconSvg : eyeIconSvg;
            }
        });
    }

    passwordToggleButtons.forEach(function (button) {
        button.addEventListener("click", function () {
            setPasswordVisibility(!passwordsVisible);
        });
    });

    registerForm.addEventListener("submit", function (event) {
        let isValid = true;

        registerForm.querySelectorAll("[required]").forEach(function (field) {
            field.setCustomValidity("");
            if (!field.value.trim()) {
                field.setCustomValidity("This field is required.");
                if (isValid) {
                    field.reportValidity();
                }
                isValid = false;
            }
        });

        const emailValue = emailInput.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (isValid && !emailRegex.test(emailValue)) {
            emailInput.setCustomValidity("Email must contain '@' and a '.' after '@'.");
            emailInput.reportValidity();
            isValid = false;
        }

        const phoneValue = phoneInput.value.trim();
        if (isValid && !/^\d{1,20}$/.test(phoneValue)) {
            phoneInput.setCustomValidity("Phone number must contain digits only and be at most 20 digits.");
            phoneInput.reportValidity();
            isValid = false;
        }

        if (isValid && passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.setCustomValidity("Passwords do not match.");
            confirmPasswordInput.reportValidity();
            isValid = false;
        }

        if (!isValid) {
            event.preventDefault();
        }
    });
</script>
</body>
</html>
