<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – TheWinx</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<main class="container">

    <nav class="site-nav">
        <a class="site-nav-brand" href="http://localhost:8081/">TheWinx</a>
        <a class="current" href="http://localhost:8081/">Identity</a>
        <a href="http://localhost:8082/list.html">Fleet</a>
        <a href="http://localhost:8083/ui/search">Booking</a>
        <a href="http://localhost:8084/payments">Payments</a>
        <a href="http://localhost:8085/ratings">Ratings</a>
    </nav>

    <header class="panel hero">
        <hgroup>
            <p class="eyebrow">BC-01 · Identity &amp; Access</p>
            <h1>Create your account</h1>
            <p class="subtitle">Join TheWinx to book and manage fleet vehicles.</p>
        </hgroup>
        <nav class="link-group">
            <a class="link-button secondary-button" href="/ui/login">← Sign in instead</a>
        </nav>
    </header>

    <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>

    <section class="panel">
        <h2>Account Details</h2>
        <form id="registerForm" action="/ui/users" method="post" novalidate>

            <div class="form-grid">
                <label>First name
                    <input id="firstName" type="text" name="firstName" placeholder="First name" required>
                </label>
                <label>Last name
                    <input id="lastName" type="text" name="lastName" placeholder="Last name" required>
                </label>
                <label>E-mail address
                    <input id="email" type="email" name="email" placeholder="E-mail address" required>
                </label>
                <label>Username
                    <input id="username" type="text" name="username" placeholder="Username" required>
                </label>
                <label>Phone number
                    <input id="phoneNumber" type="text" name="phoneNumber" placeholder="Phone number"
                           inputmode="numeric" maxlength="20" pattern="[0-9]{1,20}" required>
                </label>
                <label>Date of birth <small style="font-weight:400;opacity:.7">(required for age-restricted vehicles)</small>
                    <input id="dateOfBirth" type="date" name="dateOfBirth" required>
                </label>
            </div>

            <div class="form-grid">
                <label>Password
                    <div class="input-group">
                        <input id="password" type="password" name="password" placeholder="Password" minlength="6" required>
                        <button type="button" class="toggle-btn" data-pw-toggle aria-label="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </label>
                <label>Confirm password
                    <div class="input-group">
                        <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Confirm password" minlength="6" required>
                        <button type="button" class="toggle-btn" data-pw-toggle aria-label="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </label>
            </div>

            <input type="hidden" name="redirectTo" value="/ui/login">

            <nav class="form-full btn-row">
                <button type="submit">Register</button>
                <a class="link-button secondary-button" href="/ui/login">Already have an account?</a>
            </nav>

        </form>
    </section>

</main>
<script>
const phoneInput    = document.getElementById("phoneNumber");
const passwordInput = document.getElementById("password");
const confirmInput  = document.getElementById("confirmPassword");
const toggleBtns    = document.querySelectorAll("[data-pw-toggle]");
const eyeOpen = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>';
const eyeSlash = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238 15 12.879l-.707.707-2.018-2.018A8.7 8.7 0 0 1 8 13.5C3 13.5 0 8 0 8a15 15 0 0 1 3.293-3.85L1 1.854 1.707 1.146l12 12-.348.092zM11.297 9.176l-1.442-1.442a2 2 0 0 1-2.113-2.113L6.298 4.176A3 3 0 0 0 11.297 9.176M5.833 3.711l1.531 1.531A2 2 0 0 1 9.758 7.636l1.531 1.531A3.998 3.998 0 0 0 12 8c0-.335-.042-.66-.121-.97A13 13 0 0 0 14.828 8c-.058.087-.122.178-.195.288a13 13 0 0 1-1.465 1.755q-.12.12-.246.238l-.735-.735A3 3 0 0 1 8 11a3 3 0 0 1-3-3 3 3 0 0 1 .833-2.089"/><path d="M8 3.5c2.12 0 3.879 1.168 5.168 2.457q.175.175.34.355A13 13 0 0 0 14.828 8c-.086.13-.195.288-.195.288l.707.707S16 8 16 8s-3-5.5-8-5.5a7.8 7.8 0 0 0-2.207.319l.84.84A6.8 6.8 0 0 1 8 3.5"/></svg>';
let visible = false;

phoneInput.addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, "").slice(0, 20);
});

toggleBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        visible = !visible;
        passwordInput.type = confirmInput.type = visible ? "text" : "password";
        toggleBtns.forEach(b => {
            b.innerHTML = visible ? eyeSlash : eyeOpen;
            b.setAttribute("aria-label", visible ? "Hide password" : "Show password");
        });
    });
});

document.getElementById("registerForm").addEventListener("submit", e => {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const emailEl = document.getElementById("email");

    for (const f of document.querySelectorAll("[required]")) {
        f.setCustomValidity("");
        if (!f.value.trim()) { f.setCustomValidity("This field is required."); f.reportValidity(); e.preventDefault(); return; }
    }
    if (!emailRegex.test(emailEl.value.trim())) {
        emailEl.setCustomValidity("Please enter a valid email address."); emailEl.reportValidity(); e.preventDefault(); return;
    }
    if (!/^\d{1,20}$/.test(phoneInput.value.trim())) {
        phoneInput.setCustomValidity("Phone must be digits only, up to 20 digits."); phoneInput.reportValidity(); e.preventDefault(); return;
    }
    if (passwordInput.value !== confirmInput.value) {
        confirmInput.setCustomValidity("Passwords do not match."); confirmInput.reportValidity(); e.preventDefault();
    }
});
</script>
</body>
</html>
