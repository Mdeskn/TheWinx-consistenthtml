<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body class="auth-theme auth-login">
<main class="container-fluid px-0 auth-shell">
    <section class="row g-0 auth-card">
        <div class="col-lg-6 d-none d-lg-flex auth-art align-items-center justify-content-center">
            <a class="brand" href="/">iofrm</a>
        </div>

        <div class="col-12 col-lg-6 auth-form-wrap d-flex align-items-center">
            <div class="auth-form-inner w-100 mx-auto">
                <h1>Get more things done with Login platform</h1>
                <p class="auth-sub">Access to the most powerfull tool in the entire design and web industry</p>

                <nav class="auth-switch d-flex" aria-label="Authentication mode">
                    <a class="active" href="/ui/login">Login</a>
                    <a href="/ui/register">Register</a>
                </nav>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form class="auth-form" action="/ui/login" method="post">
                    <div class="mb-3">
                        <input id="username" class="form-control" type="text" name="username" placeholder="E-mail Address" required>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input id="password" class="form-control" type="password" name="password" placeholder="Password" required>
                            <button id="loginPasswordToggle" class="btn btn-outline-secondary" type="button" aria-label="Show password" aria-pressed="false">
                                <span id="loginPasswordToggleIcon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex align-items-center mb-3 auth-meta">
                        <div class="form-check mb-0">
                            <input class="form-check-input me-2" type="checkbox" value="1" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-3 mb-4">
                        <button type="submit" class="btn auth-btn">Login</button>
                        <a class="auth-link" href="#">Forget password?</a>
                    </div>
                </form>

            </div>
        </div>
    </section>

    <section class="auth-result" th:if="${auth != null}">
        <h3>Authentication Result</h3>
        <p><strong>User ID:</strong> <span th:text="${auth.userId}"></span></p>
        <p><strong>Username:</strong> <span th:text="${auth.username}"></span></p>
        <p><strong>Token Type:</strong> <span th:text="${auth.tokenType}"></span></p>
        <p><strong>Permissions:</strong> <span th:text="${auth.permissions}"></span></p>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const loginPasswordInput = document.getElementById("password");
    const loginPasswordToggle = document.getElementById("loginPasswordToggle");
    const loginPasswordToggleIcon = document.getElementById("loginPasswordToggleIcon");
    const eyeIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>';
    const eyeSlashIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238 15 12.879l-.707.707-2.018-2.018A8.7 8.7 0 0 1 8 13.5C3 13.5 0 8 0 8a15 15 0 0 1 3.293-3.85L1 1.854 1.707 1.146l12 12-.348.092zM11.297 9.176l-1.442-1.442a2 2 0 0 1-2.113-2.113L6.298 4.176A3 3 0 0 0 11.297 9.176M5.833 3.711l1.531 1.531A2 2 0 0 1 9.758 7.636l1.531 1.531A3.998 3.998 0 0 0 12 8c0-.335-.042-.66-.121-.97A13 13 0 0 0 14.828 8c-.058.087-.122.178-.195.288a13 13 0 0 1-1.465 1.755q-.12.12-.246.238l-.735-.735A3 3 0 0 1 8 11a3 3 0 0 1-3-3 3 3 0 0 1 .833-2.089"/><path d="M8 3.5c2.12 0 3.879 1.168 5.168 2.457q.175.175.34.355A13 13 0 0 0 14.828 8c-.086.13-.195.288-.195.288l.707.707S16 8 16 8s-3-5.5-8-5.5a7.8 7.8 0 0 0-2.207.319l.84.84A6.8 6.8 0 0 1 8 3.5"/></svg>';

    loginPasswordToggle.addEventListener("click", function () {
        const shouldShowPassword = loginPasswordInput.type === "password";
        loginPasswordInput.type = shouldShowPassword ? "text" : "password";
        loginPasswordToggle.setAttribute("aria-pressed", String(shouldShowPassword));
        loginPasswordToggle.setAttribute("aria-label", shouldShowPassword ? "Hide password" : "Show password");
        loginPasswordToggleIcon.innerHTML = shouldShowPassword ? eyeSlashIconSvg : eyeIconSvg;
    });
</script>
</body>
</html>
