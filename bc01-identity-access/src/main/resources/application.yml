server:
  port: 8081

spring:
  application:
    name: bc01-identity-access
  config:
    import: "optional:configserver:http://localhost:8888"
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:identity;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
resilience4j:
  circuitbreaker:
    instances:
      bc03-booking:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      bc04-payment:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      bc02-fleet:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

# Feign client configuration
feign:
  circuitbreaker:
    enabled: true

# Direct URLs for downstream services (used when Eureka is not running)
fleet:
  service:
    url: http://localhost:8082

booking:
  service:
    url: http://localhost:8083

rating:
  service:
    url: http://localhost:8085
