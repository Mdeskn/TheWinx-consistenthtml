<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Management – Search Nearby</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<main class="container">

    <nav class="site-nav">
        <a class="site-nav-brand" href="http://localhost:8081/">TheWinx</a>
        <a href="http://localhost:8081/">Identity</a>
        <a class="current" href="http://localhost:8082/list.html">Fleet</a>
        <a href="http://localhost:8083/ui/search">Booking</a>
        <a href="http://localhost:8084/payments">Payments</a>
        <a href="http://localhost:8085/ratings">Ratings</a>
    </nav>

    <header class="panel hero">
        <hgroup>
            <p class="eyebrow">BC-02 · Fleet Management</p>
            <h1>Search Nearby Vehicles</h1>
            <p class="subtitle">Find available vehicles based on location and radius.</p>
        </hgroup>
        <nav class="link-group">
            <a class="link-button secondary-button" href="list.html">← All Vehicles</a>
            <a class="link-button secondary-button" href="add.html">Add Vehicle</a>
        </nav>
    </header>

    <section class="panel">
        <h2>Search Location</h2>
        <div class="form-grid">
            <label>Latitude
                <input type="number" step="0.0001" id="lat" value="51.5136">
            </label>
            <label>Longitude
                <input type="number" step="0.0001" id="lon" value="7.4653">
            </label>
            <label>Radius (km)
                <input type="number" step="0.1" id="radius" value="5">
            </label>
            <label>&nbsp;
                <button type="button" onclick="searchVehicles()">Search</button>
            </label>
        </div>
        <p id="message" class="message"></p>
    </section>

    <section class="panel">
        <h2>Search Results</h2>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Type</th><th>Description</th>
                    <th>Status</th><th>Price / Unit</th><th>Billing</th><th>Location</th>
                </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </section>

</main>
<script>
document.addEventListener("DOMContentLoaded", searchVehicles);

async function searchVehicles() {
    const lat     = document.getElementById("lat").value;
    const lon     = document.getElementById("lon").value;
    const radius  = document.getElementById("radius").value;
    const message = document.getElementById("message");
    try {
        const r = await fetch(`http://localhost:8082/providers/vehicles/near?lat=${lat}&lon=${lon}&radius=${radius}`);
        if (!r.ok) throw new Error();
        const vehicles = await r.json();
        renderResults(vehicles);
        message.textContent = `${vehicles.length} available vehicle(s) found.`;
        message.className = "message success";
    } catch {
        message.textContent = "Could not search vehicles. Please make sure the Fleet service is running.";
        message.className = "message error";
    }
}

function renderResults(vehicles) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";
    vehicles.forEach(v => {
        const statusClass = v.status === "AVAILABLE" ? "status-available" : "status-booked";
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${v.vehicleId}</td>
            <td><strong>${v.name || "-"}</strong></td>
            <td>${v.type}</td>
            <td>${v.description || "-"}</td>
            <td><span class="status ${statusClass}">${v.status}</span></td>
            <td>EUR ${v.pricePerUnit}</td>
            <td>${v.billingModel}</td>
            <td>${v.currentLatitude}, ${v.currentLongitude}</td>`;
        tbody.appendChild(row);
    });
}
</script>
</body>
</html>
