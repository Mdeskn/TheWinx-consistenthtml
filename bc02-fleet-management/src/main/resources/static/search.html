<!DOCTYPE html>
<html>
<head>
    <title>Search Nearby Vehicles</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>

<div class="fleet-shell">

    <header class="topbar">
        <div class="topbar-brand">
            <span class="badge-bc">BC-02</span>
            <h1>Fleet Management</h1>
        </div>
        <nav class="nav-links">
            <a href="list.html">Vehicles</a>
            <a href="add.html">Add Vehicle</a>
            <a href="search.html">Search Nearby</a>
        </nav>
    </header>

    <section class="hero-banner">
        <div>
            <h2>Search Nearby Available Vehicles</h2>
            <p>Find available vehicles based on location and search radius.</p>
        </div>
        <div class="hero-icon">NEAR</div>
    </section>

    <section class="section-panel">
        <h3><span class="dot"></span>Search Location</h3>

        <div class="form-grid">
            <label>
                Latitude
                <input type="number" step="0.0001" id="lat" value="51.5136">
            </label>

            <label>
                Longitude
                <input type="number" step="0.0001" id="lon" value="7.4653">
            </label>

            <label>
                Radius in KM
                <input type="number" step="0.1" id="radius" value="5">
            </label>

            <label>
                &nbsp;
                <button onclick="searchVehicles()">Search</button>
            </label>
        </div>

        <p id="message" class="message"></p>
    </section>

    <section class="section-panel">
        <h3><span class="dot"></span>Search Results</h3>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Price / Day</th>
                    <th>Billing</th>
                    <th>Location</th>
                </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </section>

</div>

<script>
document.addEventListener("DOMContentLoaded", searchVehicles);

async function searchVehicles() {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;
    const radius = document.getElementById("radius").value;
    const message = document.getElementById("message");

    try {
        const response = await fetch(`http://localhost:8082/providers/vehicles/near?lat=${lat}&lon=${lon}&radius=${radius}`);

        if (!response.ok) {
            throw new Error("Search failed");
        }

        const vehicles = await response.json();
        renderResults(vehicles);

        message.textContent = `${vehicles.length} available vehicle(s) found.`;
        message.className = "message success";
    } catch (error) {
        message.textContent = "Could not search vehicles. Please make sure the Fleet service is running.";
        message.className = "message error";
    }
}

function renderResults(vehicles) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    vehicles.forEach(v => {
        const row = document.createElement("tr");
        const statusClass = v.status === "AVAILABLE" ? "status-available" : "status-booked";

        row.innerHTML = `
            <td>${v.id}</td>
            <td><strong>${v.name || "-"}</strong></td>
            <td>${v.type}</td>
            <td>${v.description || "-"}</td>
            <td><span class="status-pill ${statusClass}">${v.status}</span></td>
            <td>EUR ${v.pricePerUnit}</td>
            <td>${v.billingModel}</td>
            <td>${v.currentLatitude}, ${v.currentLongitude}</td>
        `;

        tbody.appendChild(row);
    });
}
</script>

</body>
</html>
