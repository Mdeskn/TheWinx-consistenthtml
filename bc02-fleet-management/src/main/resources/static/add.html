<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Management – Add Vehicle</title>
    <link rel="stylesheet" href="http://localhost:8080/styles.css">
</head>
<body>
<main class="container">

    <nav class="site-nav">
        <a class="site-nav-brand" href="http://localhost:8081/">TheWinx</a>
        <a href="http://localhost:8081/">Identity</a>
        <a class="current" href="http://localhost:8082/list.html">Fleet</a>
        <a href="http://localhost:8083/ui/search">Booking</a>
        <a href="http://localhost:8084/payments">Payments</a>
        <a href="http://localhost:8085/ratings">Ratings</a>
    </nav>

    <header class="panel hero">
        <hgroup>
            <p class="eyebrow">BC-02 · Fleet Management</p>
            <h1>Add a New Vehicle</h1>
            <p class="subtitle">Register a vehicle with location, pricing, and usage restrictions.</p>
        </hgroup>
        <nav class="link-group">
            <a class="link-button secondary-button" href="list.html">← All Vehicles</a>
            <a class="link-button secondary-button" href="search.html">Search Nearby</a>
        </nav>
    </header>

    <section class="panel">
        <h2>Vehicle Details</h2>

        <form id="vehicleForm">
            <div class="form-grid">
                <label>Provider ID
                    <input type="number" id="providerId" value="1" required>
                </label>
                <label>Vehicle Name
                    <input type="text" id="name" placeholder="Tier E-Scooter" required>
                </label>
                <label>Type
                    <select id="type" required>
                        <option value="E_SCOOTER">E-Scooter</option>
                        <option value="BICYCLE">Bicycle</option>
                        <option value="E_BIKE">E-Bike</option>
                        <option value="E_CAR">E-Car</option>
                    </select>
                </label>
                <label>Price Per Unit (EUR)
                    <input type="number" step="0.01" id="price" placeholder="8.00" required>
                </label>
                <label>Description
                    <input type="text" id="description" placeholder="Dortmund City vehicle">
                </label>
                <label>Latitude
                    <input type="number" step="0.0001" id="lat" placeholder="51.5136" required>
                </label>
                <label>Longitude
                    <input type="number" step="0.0001" id="lon" placeholder="7.4653" required>
                </label>
                <label>Max Duration (min)
                    <input type="number" id="maxDuration" placeholder="120">
                </label>
                <label>Max Kilometers
                    <input type="number" id="maxKm" placeholder="30">
                </label>
                <label>Minimum Age
                    <input type="number" id="minAge" placeholder="18">
                </label>
                <label>Max Persons
                    <input type="number" id="maxPersons" placeholder="1">
                </label>
                <label>Billing Model
                    <select id="billingModel" required>
                        <option value="PER_HOUR">Per Hour</option>
                        <option value="PER_KILOMETER">Per Kilometer</option>
                        <option value="PER_DAY">Per Day</option>
                    </select>
                </label>
            </div>

            <nav class="form-full btn-row">
                <button type="submit">Add Vehicle</button>
                <a href="list.html" class="link-button secondary-button">View Vehicles</a>
            </div>

            <p id="message" class="message"></p>
        </form>
    </section>

</main>
<script>
document.getElementById("vehicleForm").addEventListener("submit", async e => {
    e.preventDefault();
    const providerId = document.getElementById("providerId").value;
    const message    = document.getElementById("message");
    const vehicle = {
        name:               document.getElementById("name").value.trim(),
        type:               document.getElementById("type").value,
        description:        document.getElementById("description").value.trim(),
        currentLatitude:    Number(document.getElementById("lat").value),
        currentLongitude:   Number(document.getElementById("lon").value),
        pricePerUnit:       Number(document.getElementById("price").value),
        billingModel:       document.getElementById("billingModel").value,
        maxDurationMinutes: Number(document.getElementById("maxDuration").value),
        maxKilometers:      Number(document.getElementById("maxKm").value),
        minAge:             Number(document.getElementById("minAge").value),
        maxPersons:         Number(document.getElementById("maxPersons").value)
    };
    if (!vehicle.name) { message.textContent = "Vehicle name is required."; message.className = "message error"; return; }
    try {
        const r = await fetch(`http://localhost:8082/providers/${providerId}/vehicles`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(vehicle)
        });
        if (!r.ok) throw new Error(await r.text());
        message.textContent = "Vehicle added successfully.";
        message.className = "message success";
        document.getElementById("vehicleForm").reset();
        document.getElementById("providerId").value = providerId;
    } catch {
        message.textContent = "Could not add vehicle. The name may already exist for this provider.";
        message.className = "message error";
    }
});
</script>
</body>
</html>
